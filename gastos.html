<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gastos del viaje · MDreieck</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;padding-bottom:80px}
.hdr{background:#1a1080;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hlogo{width:38px;height:38px;background:#fff;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hlogo img{width:100%;height:100%;object-fit:contain}
.hdr-info{flex:1}.hdr h1{font-size:14px;font-weight:800}.hdr p{font-size:11px;opacity:.75}
.folio-badge{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3)}
main{padding:14px;max-width:560px;margin:0 auto}
.card{background:#fff;border:1px solid #dde4ee;border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:12px;font-weight:800;color:#1a1080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:#556;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid #ccd4e0;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:#1a1080}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tipo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.tipo-btn{border:2px solid #ccd4e0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:#fff;touch-action:manipulation}
.tipo-btn.sel-ded{border-color:#145c2f;background:#e8f4ec}
.tipo-btn.sel-noded{border-color:#b05000;background:#fff3e8}
.tipo-btn .ico{font-size:24px;display:block;margin-bottom:4px}
.tipo-btn .lbl{font-size:13px;font-weight:700}
.tipo-btn .sub{font-size:11px;color:#888;margin-top:2px}
.gasto-item{border:1px solid #dde4ee;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.gasto-item.ded{border-left:4px solid #145c2f}
.gasto-item.noded{border-left:4px solid #b05000}
.gasto-info{flex:1}
.gasto-info h3{font-size:13px;font-weight:700;color:#1a1a1a}
.gasto-info p{font-size:11px;color:#778;margin-top:2px}
.gasto-monto{font-size:15px;font-weight:800;color:#1a1080;text-align:right}
.gasto-del{background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}
.foto-preview{width:56px;height:56px;border-radius:8px;overflow:hidden;border:1px solid #dde4ee;flex-shrink:0;background:#f0f4f8}
.foto-preview img{width:100%;height:100%;object-fit:cover}
.btn{display:block;width:100%;padding:14px;background:#1a1080;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;touch-action:manipulation}
.btn:active{opacity:.85}
.btn.green{background:#145c2f}
.btn.orange{background:#b05000}
.btn.outline{background:#fff;color:#1a1080;border:2px solid #1a1080}
.btn.red{background:#c0392b}
.total-box{background:linear-gradient(135deg,#1a1080,#2e75b6);color:#fff;border-radius:14px;padding:16px;margin-bottom:12px;text-align:center}
.total-box .lbl{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.06em}
.total-box .monto{font-size:32px;font-weight:900;margin:4px 0}
.total-box .sub{font-size:12px;opacity:.75}
.badge-ded{background:#e8f4ec;color:#145c2f;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-noded{background:#fff3e8;color:#b05000;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;color:#1a1080;margin-bottom:16px}
.foto-add{border:2px dashed #ccd4e0;border-radius:10px;padding:20px;text-align:center;cursor:pointer;color:#778;font-size:13px;margin-bottom:10px}
.foto-add-preview{border-radius:10px;overflow:hidden;margin-bottom:10px;max-height:200px;display:none}
.foto-add-preview img{width:100%;object-fit:cover}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1080;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#145c2f}.toast.err{background:#c0392b}
.empty{text-align:center;padding:24px;color:#aaa;font-size:13px}
</style>

<!-- Modal agregar gasto -->

    <h2 id="modal-title">Agregar gasto</h2>

    <div class="tipo-toggle">
      <div class="tipo-btn sel-ded" id="btn-ded" onclick="selTipo('deducible')">

        <div class="sub">Factura oficial</div>
      </div>
      <div class="tipo-btn" id="btn-noded" onclick="selTipo('nodeducible')">
        <span class="ico">📝</span>
        <div class="lbl">No deducible</div>
        <div class="sub">Vale / ticket</div>
      </div>
    </div>

    <!-- Campos comunes -->
    <div class="field"><label>Fecha</label><input type="date" id="g-fecha"></div>
    <div class="field"><label>Concepto</label>

        <option>Hospedaje</option>

        <option>Otro</option>
      </select>

    <!-- Campos deducible -->
    <div id="campos-ded">
      <div class="row3">
        <div class="field"><label>Subtotal ($)</label><input type="number" id="g-subtotal" placeholder="0.00" min="0" step="0.01" oninput="calcIVA()"></div>
        <div class="field"><label>IVA ($)</label><input type="number" id="g-iva" placeholder="0.00" min="0" step="0.01" oninput="calcTotal()"></div>
        <div class="field"><label>Total ($)</label><input type="number" id="g-total-ded" placeholder="0.00" min="0" step="0.01"></div>

    </div>

    <div id="campos-noded" style="display:none">

          <option>Ticket</option>

    <div class="field"><label>Foto / imagen del comprobante</label>
      <label class="foto-add" id="foto-add-lbl">

        <input type="file" accept="image/*" capture="environment" style="display:none" id="foto-input" onchange="fotoSeleccionada(this)">

      </div>

<script>
const SURL='https://script.google.com/macros/s/AKfycbyyGlsjZtXH-bhP6GDp6WjXxI1c4WuQ6mj8RqBxAgelMSg_SQOl6yYTftp8Thb-b6Ih/exec';
const DRIVE_ID='1OuIJ2sDEVvVU6tZWfjKbcSUIv6TJIEPU';
const SHEET_ID='1AjEUB8nYDjqDzLF8F7TjeLx6Es-h7TiNSoYzKCSzhzM';

let viajeIdx=0, viaje=null, tipoActual='deducible', fotoData=null, fotoName=null, fotoType=null;

// Init
window.addEventListener('DOMContentLoaded',()=>{
  viajeIdx=parseInt(sessionStorage.getItem('cv_viaje_idx')||'0');
  const viajes=getViajes();
  viaje=viajes[viajeIdx];
  if(!viaje){window.location.href='index.html';return;}
  document.getElementById('hdr-titulo').textContent=viaje.proyecto+' · '+viaje.tecnico;
  document.getElementById('hdr-sub').textContent=viaje.inicio+' → '+viaje.fin;
  document.getElementById('folio-badge').textContent=viaje.folio||'---';
  document.getElementById('g-proyecto').value=viaje.proyecto;
  document.getElementById('g-fecha').value=new Date().toISOString().split('T')[0];
  renderGastos();
});

function getViajes(){return JSON.parse(localStorage.getItem('cv_viajes')||'[]');}
function saveViajes(v){localStorage.setItem('cv_viajes',JSON.stringify(v));}

function selTipo(tipo){
  tipoActual=tipo;
  const ded=tipo==='deducible';
  document.getElementById('btn-ded').className='tipo-btn '+(ded?'sel-ded':'');
  document.getElementById('btn-noded').className='tipo-btn '+(ded?'':'sel-noded');
  document.getElementById('campos-ded').style.display=ded?'block':'none';
  document.getElementById('campos-noded').style.display=ded?'none':'block';
  document.getElementById('modal-title').textContent=ded?'Gasto deducible':'Gasto no deducible';
}

function calcIVA(){
  const sub=parseFloat(document.getElementById('g-subtotal').value)||0;
  const iva=Math.round(sub*0.16*100)/100;
  document.getElementById('g-iva').value=iva||'';
  document.getElementById('g-total-ded').value=Math.round((sub+iva)*100)/100||'';
}

function calcTotal(){
  const sub=parseFloat(document.getElementById('g-subtotal').value)||0;
  const iva=parseFloat(document.getElementById('g-iva').value)||0;
  document.getElementById('g-total-ded').value=Math.round((sub+iva)*100)/100||'';
}

function fotoSeleccionada(input){
  const file=input.files[0];
  if(!file) return;
  fotoName=file.name||'comprobante.jpg';
  fotoType=file.type||'image/jpeg';
  const reader=new FileReader();
  reader.onload=ev=>{
    fotoData=ev.target.result;
    document.getElementById('foto-preview-img').src=fotoData;
    document.getElementById('foto-preview-box').style.display='block';
    document.getElementById('foto-add-lbl').textContent='📷 Cambiar foto';
  };
  reader.readAsDataURL(file);
}

function guardarGasto(){
  const fecha=document.getElementById('g-fecha').value;
  const concepto=document.getElementById('g-concepto').value;
  if(!fecha||!concepto){toast('Completa fecha y concepto','err');return;}

  let gasto={tipo:tipoActual, fecha, concepto, proyecto:viaje.proyecto};
  if(tipoActual==='deducible'){
    const sub=parseFloat(document.getElementById('g-subtotal').value)||0;
    const iva=parseFloat(document.getElementById('g-iva').value)||0;
    const total=parseFloat(document.getElementById('g-total-ded').value)||0;
    if(!total){toast('Captura el total','err');return;}
    gasto.subtotal=sub; gasto.iva=iva; gasto.total=total;
    gasto.folioFiscal=document.getElementById('g-folio').value.trim();
  }else{
    const total=parseFloat(document.getElementById('g-total-noded').value)||0;
    if(!total){toast('Captura el total','err');return;}
    gasto.vale=document.getElementById('g-vale').value;
    gasto.total=total; gasto.subtotal=total; gasto.iva=0;
  }

  if(fotoData){
    gasto.foto={data:fotoData, name:fotoName, type:fotoType};
  }

  const viajes=getViajes();
  if(!viajes[viajeIdx].gastos) viajes[viajeIdx].gastos=[];
  viajes[viajeIdx].gastos.push(gasto);
  saveViajes(viajes);
  viaje=viajes[viajeIdx];

  closeModal();
  renderGastos();
  toast('✅ Gasto guardado','ok');
}

function eliminarGasto(i){
  if(!confirm('¿Eliminar este gasto?')) return;
  const viajes=getViajes();
  viajes[viajeIdx].gastos.splice(i,1);
  saveViajes(viajes);
  viaje=viajes[viajeIdx];
  renderGastos();
}

function renderGastos(){
  const gastos=viaje.gastos||[];
  const list=document.getElementById('gastos-list');
  if(!gastos.length){list.innerHTML='<div class="empty">Aún no hay gastos.<br>Agrega el primero.</div>';}
  else{
    list.innerHTML=gastos.map((g,i)=>{
      const badge=g.tipo==='deducible'?
        '<span class="badge-ded">Deducible</span>':
        '<span class="badge-noded">No deducible</span>';
      const fotoHtml=g.foto?`<div class="foto-preview"><img src="${g.foto.data}"></div>`:'';
      return `<div class="gasto-item ${g.tipo==='deducible'?'ded':'noded'}">
        ${fotoHtml}
        <div class="gasto-info">
          <h3>${g.concepto}</h3>
          <p>${g.fecha} · ${badge}</p>
          ${g.folioFiscal?'<p style="font-size:10px;color:#aaa">'+g.folioFiscal.substring(0,20)+'...</p>':''}
          ${g.vale?'<p style="font-size:11px;color:#b05000">'+g.vale+'</p>':''}
        </div>
        <div>
          <div class="gasto-monto">${fmt(g.total)}</div>
          <button class="gasto-del" onclick="eliminarGasto(${i})">🗑</button>
        </div>
      </div>`;
    }).join('');
  }

  // Totales
  const totalGen=gastos.reduce((s,g)=>s+(g.total||0),0);
  const totalDed=gastos.filter(g=>g.tipo==='deducible').reduce((s,g)=>s+(g.total||0),0);
  const totalNoDed=gastos.filter(g=>g.tipo==='nodeducible'||g.tipo==='no deducible').reduce((s,g)=>s+(g.total||0),0);
  document.getElementById('total-general').textContent=fmt(totalGen);
  document.getElementById('total-sub').textContent=gastos.length+' gasto(s)';
  document.getElementById('total-ded').textContent=fmt(totalDed);
  document.getElementById('total-noded').textContent=fmt(totalNoDed);
}

function showModal(){
  fotoData=null;fotoName=null;fotoType=null;
  document.getElementById('foto-preview-box').style.display='none';
  document.getElementById('foto-add-lbl').innerHTML='📷 Toca para tomar foto o seleccionar archivo<input type="file" accept="image/*" capture="environment" style="display:none" id="foto-input" onchange="fotoSeleccionada(this)">';
  document.getElementById('g-subtotal')&&(document.getElementById('g-subtotal').value='');
  document.getElementById('g-iva')&&(document.getElementById('g-iva').value='');
  document.getElementById('g-total-ded')&&(document.getElementById('g-total-ded').value='');
  document.getElementById('g-total-noded')&&(document.getElementById('g-total-noded').value='');
  document.getElementById('g-folio')&&(document.getElementById('g-folio').value='');
  document.getElementById('g-fecha').value=new Date().toISOString().split('T')[0];
  selTipo('deducible');
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

// ── GENERAR PDF + ZIP ────────────────────────────────────────────────────────
async function generarComprobacion(){
  const gastos=viaje.gastos||[];
  if(!gastos.length){toast('No hay gastos para comprobar','err');return;}

  const btn=document.getElementById('btn-generar');
  btn.textContent='Generando...'; btn.disabled=true;

  try{
    const {jsPDF}=window.jspdf;
    const zip=new JSZip();

    const deducibles=gastos.filter(g=>g.tipo==='deducible');
    const nodeducibles=gastos.filter(g=>g.tipo!=='deducible');
    const totalDed=deducibles.reduce((s,g)=>s+(g.total||0),0);
    const totalNoDed=nodeducibles.reduce((s,g)=>s+(g.total||0),0);
    const fechaHoy=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});

    // ── PDF DEDUCIBLE ──

        const base64=g.foto.data.split(',')[1];
        const ext=g.foto.name.split('.').pop()||'jpg';
        const tipo=g.tipo==='deducible'?'Factura':'Vale';
        zip.file(`${tipo}_${String(i+1).padStart(2,'0')}_${g.concepto.substring(0,15)}_${g.fecha}.${ext}`, base64, {base64:true});
      }
    });

    // ── Descargar ZIP ──
    const zipBlob=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(zipBlob);
    const a=document.createElement('a');
    a.href=url;a.download='Comprobacion_'+viaje.folio+'_'+viaje.proyecto+'.zip';a.click();

    // ── Guardar en Drive + Sheets via Apps Script ──
    try{
      const zipB64=await blobToB64(zipBlob);
      await fetch(SURL,{
        method:'POST',mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          accion:'comprobacion',
          folderId:DRIVE_ID,sheetId:SHEET_ID,
          folio:viaje.folio,tecnico:viaje.tecnico,proyecto:viaje.proyecto,
          inicio:viaje.inicio,fin:viaje.fin,ticket:viaje.ticket,
          totalDeducible:totalDed.toFixed(2),
          totalNoDeducible:totalNoDed.toFixed(2),
          total:(totalDed+totalNoDed).toFixed(2),
          numGastos:gastos.length,
          zipFile:{name:'Comprobacion_'+viaje.folio+'.zip',data:zipB64}
        })
      });
    }catch(e){console.warn('Drive error:',e);}

    // Marcar viaje como cerrado
    const viajes=getViajes();
    viajes[viajeIdx].cerrado=true;
    saveViajes(viajes);
    toast('✅ ZIP descargado y guardado en Drive','ok');

  }catch(err){
    console.error(err);
    toast('❌ Error: '+err.message,'err');
  }finally{
    btn.textContent='📄 Generar comprobación + ZIP';
    btn.disabled=false;
  }
}

function blobToB64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

function fmt(n){return '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>el.className='toast',3500);
}
</script></body></html>
